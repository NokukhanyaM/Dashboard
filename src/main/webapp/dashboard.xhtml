<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://jcp.org">

<h:head>
    <title>Banking Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <h:outputStylesheet library="css" name="style.css"/>

    <h:outputScript library="js" name="app.js"/>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>



</h:head>

<h:body>
    <!-- Hidden container for messages -->
    <h:messages id="toastMessages" globalOnly="true" layout="list" style="display:none"/>

    <!-- Toastify script -->
    <script>
        function showToastMessages() {
            const msgs = document.querySelectorAll("#toastMessages li");
            msgs.forEach(msg => {
                let text = msg.innerText;
                let isError = msg.classList.contains("error");
                Toastify({
                    text: text,
                    duration: 4000,
                    gravity: "top",
                    position: "right",
                    backgroundColor: isError ? "#e74c3c" : "#27ae60"
                }).showToast();
            });
        }

        // Run once on page load
        document.addEventListener("DOMContentLoaded", showToastMessages);

        // Run after every JSF AJAX update
        if (typeof jsf !== "undefined") {
            jsf.ajax.addOnEvent(function(data) {
                if (data.status === "success") {
                    showToastMessages();
                }
            });
        }
    </script>
    <!-- Top Navbar for Mobile/General -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <span class="navbar-brand mb-0 h1" style="color:#004a99">MYBANK</span>
        <div class="user-avatar">
            <small class="text-muted mr-2">Online Banking</small>
        </div>
    </nav>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">MYBANK</div>

        <h:form>
            <h:commandLink action="#{dashboardBean.setView('home')}" styleClass="menu-link">
                <span>🏠 Home</span>
            </h:commandLink>

            <h:commandLink action="#{dashboardBean.setView('deposit')}" styleClass="menu-link">
                <span>💰 Deposit</span>
            </h:commandLink>

            <h:commandLink action="#{dashboardBean.setView('withdraw')}" styleClass="menu-link">
                <span>💸 Withdraw</span>
            </h:commandLink>

            <div class="mt-5">
                <h:commandButton value="Secure Logout"
                                 action="#{dashboardBean.logout}"
                                 styleClass="btn btn-outline-danger w-100">
                    <f:ajax execute="@form" rer="toastMessages"/>
                </h:commandButton>
            </div>

        </h:form>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <h:form id="mainForm">

            <!-- HOME VIEW -->
            <h:panelGroup rendered="#{dashboardBean.currentView == 'home'}">
                <div class="mb-4">
                    <h2>
                        Good Day,
                        #{dashboardBean.currentUser.username}
                    </h2>
                </div>

                <div class="balance-hero">
                    <p class="text-uppercase mb-1" style="opacity: 0.8; font-size: 0.8rem; letter-spacing: 1px;">Available Balance</p>
                    <div class="balance-amount">R #{dashboardBean.balance}</div>
                    <div class="mt-3">
                        <span class="badge bg-success">Active Account</span>
                    </div>
                </div>

                <!-- Quick Shortcuts -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="action-card text-center p-4">
                            <h5>Need to save?</h5>
                            <h:commandLink value="Make a Deposit"
                                           action="#{dashboardBean.setView('deposit')}"
                                           styleClass="btn btn-outline-primary w-100 mt-2"
                                           style="text-decoration:none"/>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="action-card text-center p-4">
                            <h5>Need cash?</h5>
                            <h:commandLink value="Withdraw Funds"
                                           action="#{dashboardBean.setView('withdraw')}"
                                           styleClass="btn btn-outline-primary w-100 mt-2"
                                           style="text-decoration:none"/>
                        </div>
                    </div>
                </div>
            </h:panelGroup>

            <!-- Deposit View -->
            <h:panelGroup rendered="#{dashboardBean.currentView == 'deposit'}">
                <div class="action-card mx-auto" style="max-width: 500px;">
                    <h3 class="mb-4 text-success">Deposit Funds</h3>
                    <label class="form-label text-muted">Amount to Deposit</label>
                    <div class="input-group mb-4">
                        <span class="input-group-text bg-light">R</span>
                        <h:inputText id="depositAmount" value="#{dashboardBean.depositAmount}"
                                     styleClass="form-control form-control-lg"
                                     required="true"
                                     placeholder="0.00">
                            <f:validateDoubleRange minimum="1" maximum="100000"/>
                            <f:validateRegex pattern="^\d+(\.\d{1,2})?$"/>
                        </h:inputText>
                    </div>

                    <h:commandButton value="Confirm Deposit"
                                     action="#{dashboardBean.deposit}"
                                     styleClass="btn btn-success w-100 py-3">
                    <f:ajax execute="@form" render="toastMessages"/>

                </h:commandButton>

                </div>
            </h:panelGroup>

            <!-- Withdraw View -->
            <h:panelGroup rendered="#{dashboardBean.currentView == 'withdraw'}">
                <div class="action-card mx-auto" style="max-width: 500px;">
                    <h3 class="mb-4 text-danger">Withdraw Funds</h3>
                    <label class="form-label text-muted">Specify Amount</label>
                    <div class="input-group mb-4">
                        <span class="input-group-text bg-light">R</span>
                        <h:inputText id="withdrawAmount" value="#{dashboardBean.withdrawAmount}"
                                     styleClass="form-control form-control-lg"
                                     required="true"
                                     placeholder="0.00">
                            <f:validateDoubleRange minimum="1" maximum="10000"/>
                            <f:validateRegex pattern="^\d+(\.\d{1,2})?$"/>
                        </h:inputText>
                    </div>

                    <h:commandButton value="Complete Withdrawal"
                                     action="#{dashboardBean.withdraw}"
                                     styleClass="btn btn-danger w-100 py-3">

                    <f:ajax execute="@form" render="toastMessages"/>

                    </h:commandButton>
                </div>
            </h:panelGroup>

        </h:form>
    </div>

</h:body>
</html>
