<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Edit User | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://googleapis.com" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #334155; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 0.75rem; max-width: 500px; margin: 0 auto; }
        .form-label { font-weight: 600; font-size: 0.875rem; color: #64748b; }
        .form-control { border-radius: 0.5rem; padding: 0.6rem 0.75rem; border: 1px solid #e2e8f0; }
        .btn { border-radius: 0.5rem; font-weight: 600; padding: 0.6rem 1.2rem; }
        .back-link { text-decoration: none; color: #64748b; font-size: 0.9rem; }
    </style>
</h:head>
<h:body>
    <h:messages id="toastMessages" globalOnly="true" layout="list" style="display:none"/>

    <div class="container py-5">
        <div class="text-center mb-4">
            <h:outputLink value="admin.xhtml" styleClass="back-link">← Back to Dashboard</h:outputLink>
            <h2 class="fw-bold mt-2">Edit User Profile</h2>
            <p class="text-muted small">Update account information and permissions</p>
        </div>

        <div class="card p-4">
            <h:form id="editForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <h:inputText value="#{adminBean.selectedUser.username}" styleClass="form-control"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <h:inputText value="#{adminBean.selectedUser.email}" styleClass="form-control"/>
                </div>
                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <h:inputText value="#{adminBean.selectedUser.role}" styleClass="form-control"/>
                </div>

                <div class="d-grid gap-2">
                    <!-- Standard form submission for page movement upon success -->
                    <h:commandButton value="Save Changes" action="#{adminBean.saveUser}" styleClass="btn btn-primary"/>

                    <!-- Immediate bypasses validation to cancel out safely -->
                    <h:commandButton value="Cancel" action="#{adminBean.cancelEdit}" immediate="true" styleClass="btn btn-light text-muted"/>

                </div>
            </h:form>
        </div>
    </div>

    <script>
        function showToastMessages() {
            document.querySelectorAll("#toastMessages li").forEach(msg => {
                let isError = msg.classList.contains("error") || msg.innerText.toLowerCase().includes("error");
                Toastify({
                    text: msg.innerText, duration: 4000, gravity: "top", position: "center",
                    style: { background: isError ? "#ef4444" : "#10b981", borderRadius: "8px" }
                }).showToast();
            });
        }
        document.addEventListener("DOMContentLoaded", showToastMessages);
    </script>
</h:body>
</html>
