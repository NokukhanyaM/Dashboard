<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://googleapis.com" rel="stylesheet"/>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"/>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #334155; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 0.75rem; }
        .table thead th { background-color: #f1f5f9; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; color: #64748b; }
        .btn-sm { border-radius: 0.5rem; padding: 0.4rem 0.8rem; }
        .role-badge { font-size: 0.75rem; padding: 0.25em 0.6em; border-radius: 2rem; background-color: #e2e8f0; font-weight: 600; }
    </style>
</h:head>
<h:body>
    <h:messages id="toastMessages" globalOnly="true" layout="list" style="display:none"/>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">User Management</h2>
        </div>

        <div class="card p-4">
            <h:form id="adminForm">
                <h:dataTable id="userTable" value="#{adminBean.users}" var="user" styleClass="table align-middle">
                    <h:column>
                        <f:facet name="header">ID</f:facet>
                        <span class="text-muted small">#{user.id}</span>
                    </h:column>
                    <h:column>
                        <f:facet name="header">User Details</f:facet>
                        <div class="fw-bold text-dark">#{user.username}</div>
                        <div class="small text-muted">#{user.email}</div>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Role</f:facet>
                        <span class="role-badge">#{user.role}</span>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Actions</f:facet>
                        <div class="d-flex gap-2">

                            <h:commandLink action="#{adminBean.editUser(user)}"
                                           styleClass="btn btn-outline-primary btn-sm"
                                           value="Edit"/>

                            <h:commandLink action="#{adminBean.deleteUser(user.id)}"
                                           styleClass="btn btn-outline-danger btn-sm"
                                           onclick="return confirm('Delete permanently?');"
                                           value="Delete">
                                <f:ajax execute="@this" render="adminForm toastMessages"/>
                            </h:commandLink>
                        </div>
                    </h:column>
                </h:dataTable>
            </h:form>
        </div>
    </div>

    <script>
        function showToastMessages() {
            document.querySelectorAll("#toastMessages li").forEach(msg => {
                let isError = msg.classList.contains("error") || msg.innerText.toLowerCase().includes("error");
                Toastify({
                    text: msg.innerText, duration: 4000, gravity: "top", position: "center",
                    style: { background: isError ? "#ef4444" : "#10b981", borderRadius: "8px" }
                }).showToast();
            });
        }
        document.addEventListener("DOMContentLoaded", showToastMessages);
        if (typeof jsf !== "undefined") {
            jsf.ajax.addOnEvent(data => { if (data.status === "success") showToastMessages(); });
        }
    </script>
</h:body>
</html>
